# Add your additional Hyprland configurations here

# Device-specific pointer tuning from previous setup.
device {
    name = compx-2.4g-receiver-mouse
    sensitivity = -0.9
}

device {
    name = iptsd-virtual-touchpad-045e:0c46
    sensitivity = 0.1
}

# Keep Caps Lock remapped to Escape across upstream updates.
input {
    kb_options = caps:escape
    natural_scroll = false
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
    }
}

# Three-finger horizontal swipe switches workspaces.
gesture = 3, horizontal, workspace

# Keep tighter window spacing from previous setup.
general {
    gaps_in = 3
    gaps_out = 6
}
